<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    <div class="auth-header">
        <a href="index.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo">
        </a>
    </div>

    <div class="auth-card">
        <h2>Sign In</h2>
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="loginEmail" required>
                <label>Email or mobile number</label>
                <span class="error-msg" id="emailError"></span>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" required>
                <label>Password</label>
                <span class="error-msg" id="passwordError"></span>
            </div>
            <button type="submit" class="btn-auth-submit">Sign In</button>
            
            <div class="auth-help">
                <div>
                    <input type="checkbox" id="rememberMe" checked>
                    <label for="rememberMe" class="remember-label">Remember me</label>
                </div>
                <a href="#">Need help?</a>
            </div>
        </form>

        <div class="auth-switch">
            <p>New to Netflix? <a href="signup.html">Sign up now</a>.</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
