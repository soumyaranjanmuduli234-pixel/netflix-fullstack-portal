<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">
    
    <div class="auth-header">
        <a href="index.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo" alt="Netflix Logo">
        </a>
    </div>

    <div class="auth-card">
        <h2>Sign In</h2>
        
        <form id="signinForm">
            <div class="input-group">
                <input type="email" id="signinEmail" placeholder="Email or mobile number" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <input type="password" id="signinPassword" placeholder="Password" required autocomplete="current-password">
            </div>

            <div id="signinMessage" class="status-message"></div>

            <button type="submit" class="auth-btn">Sign In</button>
        </form>

        <div class="auth-help">
            <div class="remember-me">
                <input type="checkbox" id="rememberMe">
                <label for="rememberMe">Remember me</label>
            </div>
            <a href="#">Need help?</a>
        </div>

        <div class="auth-footer-text">
            <p>New to Netflix? <a href="signup.html">Sign up now.</a></p>
            <p class="captcha-disclaimer">
                This page is protected by Google reCAPTCHA to ensure you're not a bot.
            </p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
