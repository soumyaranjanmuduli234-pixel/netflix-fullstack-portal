<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India - Sign Up</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="auth-body">
    
    <div class="auth-header">
        <a href="index.html">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" class="logo" alt="Netflix Logo">
        </a>
    </div>

    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="sub-text">Ready to experience premium entertainment?</p>
        
        <form id="signupForm">
            <div class="input-group">
                <input type="text" id="signupUsername" placeholder="Username" required autocomplete="off">
            </div>

            <div class="input-group">
                <input type="email" id="signupEmail" placeholder="Email address" required autocomplete="email">
            </div>
            
            <div class="input-group">
                <input type="password" id="signupPassword" placeholder="Add a password" required autocomplete="new-password">
            </div>

            <div id="signupMessage" class="status-message" style="margin-top: 10px; font-weight: bold;"></div>

            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <div class="auth-help">
            <p>Already have an account? <a href="signin.html">Sign in now.</a></p>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
